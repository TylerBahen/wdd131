<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice John</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        img {
            height: 50px;
        }

        #gameboard {
            margin-top: 200px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        #rollButton {
            margin-top: 20px;
            background-color: white;
            color: black;
            padding: 12px 24px;
            border: 2px solid black;
            border-radius: 5px;
            box-shadow: 0 3px black;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        #rollButton:active {
            transform: translateY(4px);
            box-shadow: 0 1px black;
        }

        input[type="checkbox"] {
            accent-color: black;
        }
    </style>
</head>
<body>
    <div id="gameboard">
        <img class="dice1" src="assets/die_rolling.gif">
        <img class="dice2" src="assets/die_rolling.gif">
        <img class="dice3" src="assets/die_rolling.gif">
        <img class="dice4" src="assets/die_rolling.gif">
        <img class="dice5" src="assets/die_rolling.gif">
        <input type="checkbox" class="dice1" value="none" onclick="boxCheck(1)">
        <input type="checkbox" class="dice2" value="none" onclick="boxCheck(2)">
        <input type="checkbox" class="dice3" value="none" onclick="boxCheck(3)">
        <input type="checkbox" class="dice4" value="none" onclick="boxCheck(4)">
        <input type="checkbox" class="dice5" value="none" onclick="boxCheck(5)">
    </div>
    <button id="rollButton" onclick="roll()">Roll!</button>
    <script>
        function roll(){
            const dice = ['.dice1','.dice2','.dice3','.dice4','.dice5']
            dice.forEach(selector => {
                const box = document.querySelector('input'+selector)
                if (!box.checked){
                    const result = getNum()
                    document.querySelector('img'+selector).src = result[1]
                    box.value = result[0]
                    box.checked = true
                }
            })
        }

        function boxCheck(num){
            const box = document.querySelector(`input.dice${num}`)
            if(!box.checked){
                document.querySelector(`img.dice${num}`).src = "assets/die_rolling.gif"
                box.value = 'none'
            } else if (box.value=='none'){
                box.checked = false
            }
        }

        function getNum(){
            const randomNum = Math.ceil(Math.random()*6)
            return [randomNum,`assets/white_dice_${randomNum}.gif`]
        }
    </script>
</body>
</html>
